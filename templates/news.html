{% extends "base.html" %}
{% block title %}뉴스 - 중국어 일상회화{% endblock %}
{% block content %}
<div class="max-w-[1120px] mx-auto px-6 md:px-12 py-12">
  <h1 class="font-h1 text-h1 text-stone-900 mb-8">뉴스</h1>

  {% if error %}
  <p class="text-error bg-error-container rounded-lg p-4 mb-6">{{ error }}</p>
  {% endif %}

  {% if items %}
  <div class="flex flex-col gap-4">
    {% for item in items %}
    <div class="bg-surface-container rounded-xl p-6 hover:shadow-md transition-shadow">
      <h2 class="font-h2 text-h2 text-stone-900 mb-2">{{ item.title }}</h2>
      <p class="text-stone-500 text-sm mb-3">{{ item.pub_date }}</p>
      <p class="text-on-background text-body-md mb-3">{{ item.description }}</p>
      <a class="text-primary font-label-md text-label-md hover:underline" href="{{ item.link }}" target="_blank" rel="noopener">기사 보기 &rarr;</a>
    </div>
    {% endfor %}
  </div>
  {% endif %}
</div>
{% endblock %}
