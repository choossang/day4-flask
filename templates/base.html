<!doctype html>
<html class="light" lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#f5f5dc",
              "surface-tint": "#5e604d",
              "inverse-on-surface": "#f4f0ed",
              "on-secondary-fixed": "#2d150d",
              "surface": "#fcf9f5",
              "surface-container-highest": "#e5e2df",
              "on-primary": "#ffffff",
              "on-secondary-fixed-variant": "#5e3f35",
              "secondary-fixed-dim": "#e9bdae",
              "surface-variant": "#e5e2df",
              "on-surface": "#1c1c1a",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#47473f",
              "tertiary-fixed-dim": "#cac4d1",
              "surface-container": "#f1edea",
              "surface-dim": "#ddd9d6",
              "secondary-fixed": "#ffdbcf",
              "on-tertiary-fixed": "#1d1a24",
              "on-tertiary-container": "#716d79",
              "on-error-container": "#93000a",
              "inverse-primary": "#c8c8b0",
              "on-secondary-container": "#79574c",
              "error-container": "#ffdad6",
              "tertiary-fixed": "#e7e0ee",
              "tertiary": "#615c68",
              "outline-variant": "#c8c7bc",
              "secondary": "#79564b",
              "tertiary-container": "#f8f1ff",
              "inverse-surface": "#31302e",
              "surface-container-low": "#f7f3f0",
              "on-primary-fixed": "#1b1d0e",
              "on-background": "#1c1c1a",
              "surface-bright": "#fcf9f5",
              "primary": "#5e604d",
              "secondary-container": "#fed0c1",
              "primary-fixed-dim": "#c8c8b0",
              "error": "#ba1a1a",
              "outline": "#78776e",
              "on-error": "#ffffff",
              "on-primary-fixed-variant": "#474836",
              "surface-container-high": "#ebe7e4",
              "primary-fixed": "#e4e4cc",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-primary-container": "#6f705c",
              "background": "#fcf9f5",
              "on-tertiary-fixed-variant": "#494550"
            },
            spacing: {
              xl: "80px",
              container_max_width: "1120px",
              xs: "8px",
              sm: "16px",
              md: "24px",
              lg: "48px",
              gutter: "20px",
              base: "4px"
            },
            fontFamily: {
              h1: ["Plus Jakarta Sans"],
              "label-md": ["Work Sans"],
              display: ["Plus Jakarta Sans"],
              "body-md": ["Work Sans"],
              "body-lg": ["Work Sans"],
              h2: ["Plus Jakarta Sans"]
            },
            fontSize: {
              h1: ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
              "label-md": ["14px", { lineHeight: "1.4", letterSpacing: "0.05em", fontWeight: "500" }],
              display: ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
              "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              h2: ["24px", { lineHeight: "1.3", fontWeight: "600" }]
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .prose p {
        margin-bottom: 1rem;
      }
    </style>
    <title>{% block title %}중국어 일상회화{% endblock %}</title>
  </head>
  <body class="bg-background text-on-background font-body-md antialiased">
    <header class="w-full top-0 sticky z-50 bg-[#F5F5DC] border-b border-stone-200 font-plus-jakarta-sans">
      <div class="max-w-[1120px] mx-auto flex justify-between items-center h-16 px-6 md:px-12">
        <a class="text-xl font-bold tracking-tight text-stone-900" href="{{ url_for('list_posts') }}">중국어 회화</a>
        <nav class="hidden md:flex items-center gap-8">
          <a class="text-stone-500 font-medium font-label-md text-label-md hover:text-stone-900 transition-colors duration-300" href="{{ url_for('list_posts') }}">목록</a>
          <a class="text-stone-500 font-medium font-label-md text-label-md hover:text-stone-900 transition-colors duration-300" href="{{ url_for('write_post') }}">글쓰기</a>
        </nav>
        <div class="flex items-center gap-3">
        </div>
      </div>
    </header>
    {% block content %}{% endblock %}
    <footer class="w-full mt-24 bg-[#F5F5DC] border-t border-stone-200 font-plus-jakarta-sans text-sm">
      <div class="max-w-[1120px] mx-auto py-10 px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-lg font-bold text-stone-800">중국어 일상회화</div>
        <div class="text-stone-500">© 2026 상황별 대화로 배우는 실전 중국어</div>
      </div>
    </footer>
  </body>
</html>
