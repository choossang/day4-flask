{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block content %}
  <main class="max-w-[400px] mx-auto px-6 py-xl">
    <div class="bg-surface-container-low rounded-xl border border-outline-variant/70 p-lg">
      <div class="text-center mb-lg">
        <span class="material-symbols-outlined text-[48px] text-secondary mb-sm">lock</span>
        <h1 class="font-h1 text-h1 text-on-surface mb-xs">관리자 로그인</h1>
        <p class="font-body-md text-body-md text-on-surface-variant">글쓰기·수정·삭제에 필요합니다</p>
      </div>

      {% if error %}
        <div class="mb-md p-sm bg-error-container text-on-error-container rounded-lg text-sm text-center">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}" class="space-y-md">
        <div>
          <label class="block font-label-md text-label-md text-stone-500 mb-xs">비밀번호</label>
          <input type="password" name="password" placeholder="비밀번호를 입력하세요" autofocus class="w-full px-3 py-2 rounded-lg border border-outline-variant/70 text-sm bg-surface-container-low focus:outline-none focus:border-secondary transition-colors">
        </div>
        <button type="submit" class="w-full bg-secondary text-white px-md py-sm rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition-opacity font-label-md text-label-md">
          <span class="material-symbols-outlined text-sm">login</span>
          로그인
        </button>
      </form>
    </div>
  </main>
{% endblock %}
