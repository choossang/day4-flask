{% extends "base.html" %}
{% block title %}{{ form_title or '글쓰기' }}{% endblock %}
{% block content %}
  <main class="max-w-[1120px] mx-auto px-6 md:px-12 py-xl">
    <section class="max-w-3xl mx-auto bg-surface-container-low rounded-xl border border-outline-variant p-6 md:p-8">
      <div class="mb-md">
        <h1 class="font-display text-display text-on-surface mb-sm">{{ form_title or '새 글 작성' }}</h1>
        <p class="font-body-md text-body-md text-on-surface-variant">따뜻하고 차분한 톤으로 생각을 기록해 보세요.</p>
      </div>

      {% if error %}
        <div class="mb-md rounded-lg border border-error/30 bg-error-container text-on-error-container px-4 py-3 font-label-md text-label-md">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="{{ form_action or url_for('write_post') }}" class="space-y-md">
        <div>
          <label for="title" class="font-label-md text-label-md text-stone-500 uppercase tracking-wider block mb-2">제목</label>
          <input
            id="title"
            name="title"
            type="text"
            value="{{ title }}"
            class="w-full rounded-lg border border-outline-variant bg-white px-4 py-3 text-on-surface placeholder:text-stone-400 focus:border-secondary focus:ring-secondary"
            placeholder="제목을 입력하세요"
          />
        </div>

        <div>
          <label for="content" class="font-label-md text-label-md text-stone-500 uppercase tracking-wider block mb-2">본문</label>
          <textarea
            id="content"
            name="content"
            rows="14"
            class="w-full rounded-lg border border-outline-variant bg-white px-4 py-3 text-on-surface placeholder:text-stone-400 focus:border-secondary focus:ring-secondary"
            placeholder="당신의 이야기를 들려주세요"
          >{{ content }}</textarea>
        </div>

        <div class="flex flex-wrap items-center gap-3 pt-2">
          <button type="submit" class="inline-flex items-center gap-2 bg-secondary text-white px-md py-sm rounded-lg font-label-md text-label-md hover:opacity-90 transition-opacity">
            <span class="material-symbols-outlined text-[20px]">check</span>
            저장
          </button>
          <a href="{{ url_for('list_posts') }}" class="inline-flex items-center gap-2 border border-outline text-on-surface px-md py-sm rounded-lg font-label-md text-label-md hover:bg-surface-container transition-colors">
            <span class="material-symbols-outlined text-[20px]">close</span>
            취소
          </a>
        </div>
      </form>
    </section>
  </main>
{% endblock %}
